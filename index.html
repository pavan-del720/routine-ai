<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <title>RoutineAI</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#000;color:#fff;min-height:100vh}
        .app{max-width:500px;margin:0 auto;padding:16px 16px 120px}
        .header{position:sticky;top:0;z-index:10;background:#000;padding:16px 0;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #222}
        .header h1{font-size:22px;font-weight:800}
        .header span{font-size:11px;color:#888;background:#111;padding:6px 12px;border-radius:20px}
        .tabs{display:flex;gap:4px;background:#111;padding:4px;border-radius:14px;margin:16px 0}
        .tab{flex:1;padding:12px;border:none;border-radius:12px;background:none;color:#666;font-size:13px;font-weight:600;cursor:pointer}
        .tab.active{background:#222;color:#fff}
        .page{display:none}
        .page.active{display:block}
        .card{background:#111;border:1px solid #222;border-radius:18px;padding:20px;margin-bottom:14px}
        .card h3{font-size:15px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
        .scan-box{border:2px dashed #333;border-radius:18px;padding:36px 20px;text-align:center;cursor:pointer;margin-bottom:14px;transition:0.2s}
        .scan-box:active{border-color:#6366f1;background:#0a0a0f}
        .scan-box .icon{font-size:44px;display:block;margin-bottom:10px}
        .scan-box p{font-weight:600;font-size:15px}.scan-box small{color:#666;font-size:12px}
        .preview{width:100%;max-height:180px;object-fit:contain;border-radius:12px;margin:8px 0;display:none;border:1px solid #222}
        .spinner{display:none;text-align:center;padding:20px}
        .spinner.show{display:block}
        .spinner div{width:36px;height:36px;border:3px solid #222;border-top-color:#6366f1;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px}
        @keyframes spin{to{transform:rotate(360deg)}}
        textarea{width:100%;min-height:110px;padding:12px;background:#0a0a0a;border:1px solid #333;border-radius:12px;color:#fff;font-size:13px;font-family:monospace;resize:vertical;outline:none;display:none;margin-top:8px}
        textarea:focus{border-color:#6366f1}
        .day-row{display:flex;gap:6px;overflow-x:auto;padding:8px 0 14px}
        .day-row::-webkit-scrollbar{display:none}
        .day-btn{padding:8px 16px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;background:#111;border:1px solid #222;color:#888}
        .day-btn.active{background:#fff;color:#000;border-color:#fff}
        .class-item{background:#111;border:1px solid #222;border-radius:14px;padding:16px;margin-bottom:8px;display:flex;gap:14px;align-items:center}
        .class-time{text-align:center;min-width:48px}.class-time strong{display:block;font-size:14px}.class-time span{font-size:11px;color:#666}
        .class-divider{width:2px;height:36px;background:#6366f1;border-radius:2px}
        .class-info strong{font-size:15px}.class-info span{font-size:12px;color:#666;display:block;margin-top:2px}
        .exam-card{background:#111;border:1px solid #222;border-radius:14px;padding:16px;margin-bottom:8px;cursor:pointer;border-left:3px solid #6366f1}
        .exam-card.urgent{border-left-color:#ef4444}.exam-card.soon{border-left-color:#f59e0b}
        .exam-card .count{font-size:28px;font-weight:800;margin:6px 0}.count.urgent{color:#ef4444}.count.soon{color:#f59e0b}
        .exam-card .meta{font-size:12px;color:#666;display:flex;gap:12px}
        .att-card{background:#111;border:1px solid #222;border-radius:14px;padding:16px;margin-bottom:10px}
        .att-card.warn{border-color:rgba(239,68,68,0.4)}
        .att-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
        .att-pct{font-size:30px;font-weight:800}.att-pct.good{color:#10b981}.att-pct.bad{color:#ef4444}
        .bar{height:6px;background:#222;border-radius:6px;margin:8px 0;overflow:hidden}
        .bar-fill{height:100%;border-radius:6px;transition:0.5s}.bar-fill.good{background:#10b981}.bar-fill.bad{background:#ef4444}
        .att-actions{display:flex;gap:8px;margin-top:10px}
        .mat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
        .mat-card{background:#0a0a0a;border:1px solid #222;border-radius:12px;padding:12px;text-align:center;position:relative}
        .mat-card .icon{font-size:32px;display:block;margin-bottom:6px}
        .mat-card .name{font-size:11px;color:#aaa;word-break:break-all}
        .mat-card .del{position:absolute;top:4px;right:8px;background:none;border:none;color:#ef4444;font-size:14px;cursor:pointer}
        .btn{padding:13px 20px;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;width:100%;margin:4px 0;transition:0.15s}
        .btn:active{transform:scale(0.97)}
        .btn-white{background:#fff;color:#000}.btn-green{background:#10b981;color:#fff;flex:1}.btn-red{background:#ef4444;color:#fff;flex:1}
        .btn-outline{background:none;border:1px solid #333;color:#fff;width:100%}.btn-sm{padding:8px 14px;font-size:11px;width:auto}
        .modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.9);z-index:100;display:flex;align-items:flex-end;justify-content:center}
        .modal-inner{background:#111;width:100%;max-width:500px;max-height:80vh;overflow-y:auto;border-radius:22px 22px 0 0;padding:24px 20px}
        .modal-inner h2{font-size:20px;margin-bottom:8px}.modal-inner p{color:#888;font-size:13px;margin:3px 0}
        .countdown-big{font-size:44px;font-weight:800;margin:14px 0}
        .toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#1a1a1a;border:1px solid #333;color:#fff;padding:14px 24px;border-radius:30px;font-weight:700;font-size:13px;z-index:200}
        .alert{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:12px;padding:14px;margin-bottom:10px;font-size:13px}
        .empty{text-align:center;padding:40px 20px;color:#555}.empty .icon{font-size:48px;display:block;margin-bottom:12px}
        input[type=file]{display:none}
        input[type=text],input[type=date],input[type=time]{width:100%;padding:13px;background:#0a0a0a;border:1px solid #222;border-radius:10px;color:#fff;font-size:14px;outline:none;margin:4px 0}
        input:focus{border-color:#6366f1}
    </style>
</head>
<body>
<div class="app">
    <div class="header"><h1>🧠 RoutineAI</h1><span>v2.0</span></div>

    <div class="tabs">
        <button class="tab active" onclick="tab('schedule')">📅 Schedule</button>
        <button class="tab" onclick="tab('exams')">📚 Exams</button>
        <button class="tab" onclick="tab('attendance')">📊 Attendance</button>
    </div>

    <!-- SCHEDULE -->
    <div class="page active" id="pg-schedule">
        <div class="card">
            <h3>📸 Upload Timetable Photo</h3>
            <div class="scan-box" onclick="document.getElementById('sf').click()">
                <span class="icon">📷</span>
                <p>Tap to take photo or upload</p>
                <small>JPG, PNG, PDF supported</small>
            </div>
            <input type="file" id="sf" accept="image/*,.pdf" capture="environment" onchange="scan(this,'schedule')">
            <img id="spv" class="preview">
            <div class="spinner" id="ssp"><div></div><p style="color:#888;font-size:13px">Reading image...</p></div>
            <textarea id="sta" placeholder="If auto-read fails, paste your timetable text here..."></textarea>
            <button class="btn btn-white" id="sbt" style="display:none" onclick="manual('schedule')">Process Text</button>
        </div>

        <div class="day-row">
            <button class="day-btn active" onclick="setDay('Monday',this)">Monday</button>
            <button class="day-btn" onclick="setDay('Tuesday',this)">Tuesday</button>
            <button class="day-btn" onclick="setDay('Wednesday',this)">Wednesday</button>
            <button class="day-btn" onclick="setDay('Thursday',this)">Thursday</button>
            <button class="day-btn" onclick="setDay('Friday',this)">Friday</button>
            <button class="day-btn" onclick="setDay('Saturday',this)">Saturday</button>
        </div>

        <div id="scheduleList"><div class="empty"><span class="icon">📋</span>No schedule yet</div></div>
    </div>

    <!-- EXAMS -->
    <div class="page" id="pg-exams">
        <div class="card">
            <h3>📸 Upload Exam Schedule</h3>
            <div class="scan-box" onclick="document.getElementById('ef').click()">
                <span class="icon">📷</span>
                <p>Tap to take photo or upload</p>
                <small>JPG, PNG, PDF supported</small>
            </div>
            <input type="file" id="ef" accept="image/*,.pdf" capture="environment" onchange="scan(this,'exam')">
            <img id="epv" class="preview">
            <div class="spinner" id="esp"><div></div><p style="color:#888;font-size:13px">Reading image...</p></div>
            <textarea id="eta" placeholder="If auto-read fails, paste exam schedule text here..."></textarea>
            <button class="btn btn-white" id="ebt" style="display:none" onclick="manual('exam')">Process Text</button>
        </div>
        <div id="examList"><div class="empty"><span class="icon">📚</span>No exams yet</div></div>

        <div class="modal" id="examModal" style="display:none" onclick="if(event.target===this)closeModal()">
            <div class="modal-inner">
                <h2 id="mSub"></h2>
                <p id="mDate"></p><p id="mTime"></p><p id="mVenue"></p>
                <div class="countdown-big" id="mCount"></div>
                <h3 style="margin-top:16px">📁 Study Materials</h3>
                <div class="mat-grid" id="matGrid"></div>
                <div style="display:flex;gap:8px;margin-top:10px">
                    <button class="btn btn-outline btn-sm" onclick="document.getElementById('matF').click()" style="flex:1">📎 Add</button>
                    <input type="file" id="matF" accept="*/*" onchange="addMat(this)" multiple>
                    <button class="btn btn-outline btn-sm" onclick="document.getElementById('impF').click()" style="flex:1">📂 Import</button>
                    <input type="file" id="impF" accept="*/*" onchange="addMat(this)" multiple>
                </div>
                <button class="btn btn-outline" onclick="closeModal()" style="margin-top:12px">Close</button>
            </div>
        </div>
    </div>

    <!-- ATTENDANCE -->
    <div class="page" id="pg-attendance">
        <div id="attAlerts"></div>
        <div id="attendanceList"><div class="empty"><span class="icon">📊</span>Add schedule first</div></div>
    </div>
</div>

<div class="toast" id="toast" style="display:none"></div>

<script>
// STORAGE
const save=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}};
const load=k=>{try{return JSON.parse(localStorage.getItem(k))}catch(e){return null}};
let day='Monday',examId=null,W=16;

// INIT
document.addEventListener('DOMContentLoaded',()=>{renderAll()});
function toast(m,e){const t=document.getElementById('toast');t.textContent=m;t.style.color=e?'#ef4444':'#fff';t.style.display='block';setTimeout(()=>t.style.display='none',2500);}
function tab(n){
    document.querySelectorAll('.tab,.page').forEach(x=>x.classList.remove('active'));
    document.querySelector(`.tab:nth-child(${n==='schedule'?1:n==='exams'?2:3})`).classList.add('active');
    document.getElementById('pg-'+n).classList.add('active');
    if(n==='exams')renderExams();if(n==='attendance')renderAtt();
}
function setDay(d,b){day=d;document.querySelectorAll('.day-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');renderSched();}

// SCAN IMAGE
async function scan(inp,type){
    const f=inp.files[0];if(!f){toast('No file',1);return}
    const p=type==='schedule'?'s':'e';
    const r=new FileReader();r.onload=e=>{document.getElementById(p+'pv').src=e.target.result;document.getElementById(p+'pv').style.display='block'};r.readAsDataURL(f);
    document.getElementById(p+'sp').classList.add('show');
    try{
        const b64=await new Promise((rs,rj)=>{const rr=new FileReader();rr.onload=()=>rs(rr.result);rr.onerror=rj;rr.readAsDataURL(f);});
        const fd=new FormData();fd.append('base64Image',b64);fd.append('language','eng');fd.append('isOverlayRequired','false');fd.append('OCREngine','2');
        const res=await fetch('https://api.ocr.space/parse/image',{method:'POST',body:fd});
        const d=await res.json();
        document.getElementById(p+'sp').classList.remove('show');
        if(d.IsErroredOnProcessing||!d.ParsedResults?.length||!d.ParsedResults[0].ParsedText.trim()){
            document.getElementById(p+'ta').style.display='block';document.getElementById(p+'bt').style.display='block';
            toast('Auto-read failed. Paste text below.',1);
        }else{
            const txt=d.ParsedResults[0].ParsedText;
            document.getElementById(p+'ta').value=txt;document.getElementById(p+'ta').style.display='block';
            type==='schedule'?parseSched(txt):parseExam(txt);
        }
    }catch(err){
        document.getElementById(p+'sp').classList.remove('show');
        document.getElementById(p+'ta').style.display='block';document.getElementById(p+'bt').style.display='block';
        toast('Error. Paste text manually.',1);
    }
    inp.value='';
}

// MANUAL
function manual(type){const txt=document.getElementById(type==='schedule'?'sta':'eta').value.trim();if(!txt){toast('No text',1);return}type==='schedule'?parseSched(txt):parseExam(txt);}

// PARSE SCHEDULE
function parseSched(txt){
    const lines=txt.split('\n').filter(l=>l.trim()),sch={};let cd='';
    const days=['monday','tuesday','wednesday','thursday','friday','saturday','sunday'];
    for(const l of lines){
        const lo=l.toLowerCase().trim();
        const fd=days.find(d=>lo.includes(d));
        if(fd){cd=fd.charAt(0).toUpperCase()+fd.slice(1);sch[cd]=[];continue}
        if(cd){const tm=l.match(/(\d{1,2}[:.]\d{2})\s*[-–to]+\s*(\d{1,2}[:.]\d{2})/i);if(tm){let s=l.replace(tm[0],'').replace(/[|,:;\-–]/g,' ').replace(/\s+/g,' ').trim();if(s)sch[cd].push({subject:s,start:tm[1].replace('.',':'),end:tm[2].replace('.',':')})}}
    }
    if(Object.keys(sch).length){sch._start=new Date().toISOString();sch._weeks=W;save('rai_r',sch);setupAtt(sch);downloadCal();renderAll();hideScan('s');toast('✅ Schedule saved!')}
    else{toast('Could not parse. Check format.',1)}
}

// PARSE EXAMS
function parseExam(txt){
    const lines=txt.split('\n').filter(l=>l.trim()),exs=[];
    for(const l of lines){
        let ds='',sub='',time='09:00';
        let dm=l.match(/(\d{1,2}\s+(?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)[a-z]*\s+\d{4})/i);
        if(dm){const d=new Date(dm[0]);if(!isNaN(d))ds=d.toISOString().split('T')[0];sub=l.replace(dm[0],'').trim()}
        if(!ds){dm=l.match(/(\d{1,2}[\/\-.]\d{1,2}[\/\-.]\d{4})/);if(dm){const p=dm[0].split(/[\/\-.]/);let d=new Date(p[2],p[1]-1,p[0]);if(isNaN(d))d=new Date(p[2],p[0]-1,p[1]);if(!isNaN(d))ds=d.toISOString().split('T')[0];sub=l.replace(dm[0],'').trim()}}
        if(ds){sub=sub.replace(/[|,:;\-–]/g,' ').replace(/\s+/g,' ').trim();const tm=l.match(/(\d{1,2}[:.]\d{2})/);if(tm)time=tm[1].replace('.',':');exs.push({id:'ex'+Date.now()+Math.random().toString(36).substr(2,5),subject:sub||'Unknown',date:ds,time})}
    }
    if(exs.length){let e=load('rai_e')||[];e=e.concat(exs);e.sort((a,b)=>new Date(a.date)-new Date(b.date));save('rai_e',e);downloadCal();renderExams();hideScan('e');toast('✅ '+exs.length+' exams added!')}
    else{toast('Could not parse.',1)}
}

function hideScan(p){document.getElementById(p+'ta').style.display='none';document.getElementById(p+'bt').style.display='none';document.getElementById(p+'pv').style.display='none';}

// ATTENDANCE
function setupAtt(sch){let a=load('rai_a')||{};const ss=new Set();for(const[d,c]of Object.entries(sch)){if(d.startsWith('_')||!Array.isArray(c))continue;c.forEach(x=>ss.add(x.subject))}ss.forEach(s=>{let pw=0;for(const[d,c]of Object.entries(sch)){if(d.startsWith('_')||!Array.isArray(c))continue;c.forEach(x=>{if(x.subject===s)pw++})}if(!a[s])a[s]={done:0,ok:0,total:pw*W,pw}});save('rai_a',a);}
function wkIn(){const r=load('rai_r');if(!r||!r._start)return 1;return Math.max(1,Math.min(Math.ceil((new Date()-new Date(r._start))/604800000),r._weeks||W))}
function mark(sub,st){let a=load('rai_a')||{};if(!a[sub])return;a[sub].done++;if(st==='present')a[sub].ok++;save('rai_a',a);renderAtt();toast(st==='present'?'✅ Present':'❌ Absent')}
function renderAtt(){
    const a=load('rai_a')||{},w=wkIn(),list=document.getElementById('attendanceList'),alerts=document.getElementById('attAlerts');
    const ss=Object.entries(a);if(!ss.length){list.innerHTML='<div class="empty"><span class="icon">📊</span>No subjects</div>';return}
    ss.forEach(([s,d])=>{const auto=Math.min((d.pw||1)*w,d.total);if(d.done<auto)d.done=auto});save('rai_a',a);
    const warns=ss.filter(([s,d])=>d.done>0&&(d.ok/d.done)*100<80);
    alerts.innerHTML=warns.length?warns.map(([s,d])=>`<div class="alert">⚠️ <b>${s}</b> at ${((d.ok/d.done)*100).toFixed(1)}%</div>`).join(''):'';
    list.innerHTML=ss.map(([s,d])=>{const p=d.done>0?parseFloat(((d.ok/d.done)*100).toFixed(1)):0,l=p<80,rem=d.total-d.done,need=Math.ceil(0.8*d.total-d.ok);return`<div class="att-card${l?' warn':''}"><div class="att-top"><b>${s}</b><span class="att-pct ${l?'bad':'good'}">${p}%</span></div><small style="color:#666">${d.ok}/${d.done} of ${d.total}</small><div class="bar"><div class="bar-fill ${l?'bad':'good'}" style="width:${Math.min(p,100)}%"></div></div><small style="color:${l?'#ef4444':'#10b981'}">${l?`⚠ Need ${need} of next ${rem}`:`✅ Can miss ${Math.max(0,d.total-d.ok-need)}`}</small><div class="att-actions"><button class="btn btn-green" onclick="mark('${s}','present')">✅ Present</button><button class="btn btn-red" onclick="mark('${s}','absent')">❌ Absent</button></div></div>`}).join('');
}

// SCHEDULE DISPLAY
function renderSched(){const r=load('rai_r')||{},c=r[day]||[],l=document.getElementById('scheduleList');l.innerHTML=c.length?c.map(x=>`<div class="class-item"><div class="class-time"><strong>${x.start}</strong><span>${x.end}</span></div><div class="class-divider"></div><div class="class-info"><strong>${x.subject}</strong></div></div>`).join(''):'<div class="empty"><span class="icon">📋</span>No classes for '+day+'</div>'}

// EXAMS DISPLAY
function renderExams(){const e=(load('rai_e')||[]).filter(x=>new Date(x.date)>=new Date().setHours(0,0,0,0)),l=document.getElementById('examList');l.innerHTML=e.length?e.map(x=>{const d=Math.ceil((new Date(x.date)-new Date().setHours(0,0,0,0))/86400000),c=d<=3?'urgent':d<=7?'soon':'';return`<div class="exam-card ${c}" onclick="openEx('${x.id}')"><b>📚 ${x.subject}</b><div class="count ${c}">${d>0?d+'d':d===0?'TODAY':'Done'}</div><div class="meta"><span>📅 ${x.date}</span><span>⏰ ${x.time}</span></div></div>`}).join(''):'<div class="empty"><span class="icon">📚</span>No exams</div>'}
function openEx(id){examId=id;const x=(load('rai_e')||[]).find(e=>e.id===id);if(!x)return;document.getElementById('mSub').textContent='📚 '+x.subject;document.getElementById('mDate').textContent='📅 '+x.date;document.getElementById('mTime').textContent='⏰ '+x.time;const d=Math.ceil((new Date(x.date)-new Date().setHours(0,0,0,0))/86400000);document.getElementById('mCount').textContent=d>0?d+' DAYS':d===0?'🎯 TODAY':'✅ DONE';document.getElementById('mCount').style.color=d<=3?'#ef4444':d<=7?'#f59e0b':'#fff';renderMats();document.getElementById('examModal').style.display='flex'}
function closeModal(){document.getElementById('examModal').style.display='none';examId=null;renderExams()}

// MATERIALS
function addMat(inp){if(!examId)return;const fs=inp.files;if(!fs.length)return;let m=load('rai_m')||{};if(!m[examId])m[examId]=[];Array.from(fs).forEach(f=>{const r=new FileReader();r.onload=e=>{m[examId].push({id:'m'+Date.now()+Math.random().toString(36).substr(2,5),name:f.name,type:f.type,data:e.target.result});save('rai_m',m);renderMats()};r.readAsDataURL(f)});inp.value=''}
function renderMats(){if(!examId)return;const m=(load('rai_m')||{})[examId]||[],g=document.getElementById('matGrid');g.innerHTML=m.length?m.map(x=>{const i=x.type.startsWith('image/')?'🖼️':x.type.includes('pdf')?'📄':'📎';return`<div class="mat-card"><button class="del" onclick="delMat('${x.id}')">✕</button><span class="icon" onclick="viewMat('${x.id}')">${i}</span><span class="name">${x.name.substring(0,20)}</span><button class="btn btn-outline btn-sm" onclick="shareMat('${x.id}')" style="margin-top:6px;font-size:10px">📤</button></div>`}).join(''):'<p style="color:#555;text-align:center;padding:16px">No materials</p>'}
function viewMat(id){const m=((load('rai_m')||{})[examId]||[]).find(x=>x.id===id);if(!m)return;const w=window.open('','_blank');if(m.type.startsWith('image/'))w.document.write(`<img src="${m.data}" style="max-width:100%">`);else if(m.type.includes('pdf'))w.document.write(`<iframe src="${m.data}" width="100%" height="100%"></iframe>`);else{const a=document.createElement('a');a.href=m.data;a.download=m.name;a.click()}}
function shareMat(id){const m=((load('rai_m')||{})[examId]||[]).find(x=>x.id===id);if(!m)return;if(navigator.share){const bs=atob(m.data.split(',')[1]),ms=m.data.split(',')[0].split(':')[1].split(';')[0],ab=new ArrayBuffer(bs.length),ia=new Uint8Array(ab);for(let i=0;i<bs.length;i++)ia[i]=bs.charCodeAt(i);navigator.share({files:[new File([new Blob([ab],{type:ms})],m.name,{type:m.type})]}).catch(()=>{})}else{const a=document.createElement('a');a.href=m.data;a.download=m.name;a.click()}}
function delMat(id){if(!confirm('Delete?'))return;let m=load('rai_m')||{};if(m[examId]){m[examId]=m[examId].filter(x=>x.id!==id);save('rai_m',m);renderMats()}}

// CALENDAR
function downloadCal(){const r=load('rai_r')||{},dm={Monday:'MO',Tuesday:'TU',Wednesday:'WE',Thursday:'TH',Friday:'FR',Saturday:'SA',Sunday:'SU'};let ics=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//RoutineAI//EN'];for(const[d,c]of Object.entries(r)){if(d.startsWith('_')||!Array.isArray(c))continue;for(const x of c){const n=new Date(),ds=n.getFullYear()+String(n.getMonth()+1).padStart(2,'0')+String(n.getDate()).padStart(2,'0'),[sh,sm]=x.start.split(':'),[eh,em]=x.end.split(':');ics.push('BEGIN:VEVENT',`DTSTART:${ds}T${sh}${sm}00`,`DTEND:${ds}T${eh}${em}00`,`SUMMARY:${x.subject}`,`RRULE:FREQ=WEEKLY;BYDAY=${dm[d]}`,'BEGIN:VALARM','TRIGGER:-PT10M','ACTION:DISPLAY','DESCRIPTION:Class starting soon','END:VALARM','END:VEVENT')}}(load('rai_e')||[]).forEach(x=>{ics.push('BEGIN:VEVENT',`DTSTART:${x.date.replace(/-/g,'')}T${x.time.replace(':','')}00`,`SUMMARY:📚 EXAM: ${x.subject}`,'BEGIN:VALARM','TRIGGER:-PT30M','ACTION:DISPLAY','DESCRIPTION:Exam in 30 min','END:VALARM','END:VEVENT')});ics.push('END:VCALENDAR');const b=new Blob([ics.join('\r\n')],{type:'text/calendar'}),u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download='RoutineAI.ics';document.body.appendChild(a);a.click();document.body.removeChild(a);setTimeout(()=>URL.revokeObjectURL(u),5000)}

function renderAll(){renderSched();renderExams();renderAtt()}
if('serviceWorker' in navigator){const s="const C='rai';self.addEventListener('install',e=>{e.waitUntil(caches.open(C).then(c=>c.addAll(['/'])));self.skipWaiting()});self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)))});";navigator.serviceWorker.register(URL.createObjectURL(new Blob([s],{type:'application/javascript'})))}
</script>
